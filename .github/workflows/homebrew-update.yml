name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-homebrew:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get release version and download URL
        id: release
        run: |
          VERSION=${{ github.event.release.tag_name }}
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "url=${{ github.event.release.assets[0].browser_download_url }}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha256
        run: |
          URL="${{ steps.release.outputs.url }}"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          URL="${{ steps.release.outputs.url }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"

          # Update Formula/permissionpilot.rb with new version, URL, and SHA
          sed -i '' "s|url \".*\"|url \"$URL\"|" Formula/permissionpilot.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"$SHA\"|" Formula/permissionpilot.rb
          sed -i '' "s|version \".*\"|version \"$VERSION\"|" Formula/permissionpilot.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: Update Homebrew formula to v${{ steps.release.outputs.version }}"
          title: "Update Homebrew formula to v${{ steps.release.outputs.version }}"
          body: |
            Automated Homebrew formula update for release ${{ github.event.release.tag_name }}

            - URL: ${{ steps.release.outputs.url }}
            - SHA256: ${{ steps.sha256.outputs.sha256 }}
          branch: homebrew-update/${{ steps.release.outputs.version }}
          delete-branch: true
          reviewers: ChaitanyaJoshi1769
