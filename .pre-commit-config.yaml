# Pre-commit hooks configuration
# Install: pip install pre-commit
# Setup: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # SwiftFormat - Code formatting
  - repo: local
    hooks:
      - id: swift-format
        name: SwiftFormat
        entry: swiftformat
        language: system
        types: [swift]
        pass_filenames: true
        stages: [commit]

  # SwiftLint - Code linting
  - repo: local
    hooks:
      - id: swift-lint
        name: SwiftLint
        entry: swiftlint
        language: system
        types: [swift]
        pass_filenames: false
        stages: [commit]
        exclude: ^Tests/

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['--config-data', '{extends: default, rules: {line-length: {max: 120}}}']
        stages: [commit]

  # JSON validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.28.1
    hooks:
      - id: check-json
        files: ^\.github/.*\.json$|^Configuration/.*\.json$
        stages: [commit]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.38.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.json']
        stages: [commit]

  # Shell script validation
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.7
    hooks:
      - id: shellcheck
        args: ['--format', 'gcc']
        stages: [commit]

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [commit]
      - id: end-of-file-fixer
        stages: [commit]
      - id: check-yaml
        args: ['--safe']
        stages: [commit]
      - id: check-added-large-files
        args: ['--maxkb=10000']
        stages: [commit]
      - id: detect-private-key
        stages: [commit]
      - id: check-merge-conflict
        stages: [commit]

# Global configuration
default_language_version:
  python: python3

# Minimal stages (faster for developers)
default_stages: [commit]
fail_fast: false

# Skip these in CI (already linted)
exclude: ^(build|\.build|DerivedData)/
